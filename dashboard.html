<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Book Study · Dashboard</title>
    <!-- Font Awesome (icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<!-- ============================== -->
<!--  NAVBAR (shared)              -->
<!-- ============================== -->
<nav class="navbar" id="mainNav">
    <div class="nav-container">
        <div class="nav-logo">
            <i class="fas fa-book-open"></i> E-Book Study
        </div>
        <ul class="nav-menu" id="navMenu">
            <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="dashboard.html" class="active"><i class="fas fa-columns"></i> Dashboard</a></li>
            <li><a href="write.html"><i class="fas fa-pen-fancy"></i> Write</a></li>
        </ul>
    </div>
</nav>

<!-- ============================== -->
<!--  PAGE: DASHBOARD              -->
<!-- ============================== -->
<div class="dashboard">
    <div class="dashboard-header">
            <h1><i class="fas fa-layer-group"></i> My Notes</h1>
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="search-input" placeholder="Search notes by title..." class="search-input">
            </div>
            <div class="category-toggle">
                <button class="toggle-btn active" data-category="all">All</button>
                <button class="toggle-btn" data-category="java"><i class="fab fa-java"></i> Java</button>
                <button class="toggle-btn" data-category="general"><i class="fas fa-file-alt"></i> General</button>
            </div>
            <a href="write.html" class="btn btn-primary"><i class="fas fa-plus-circle"></i> New Note</a>
        </div>
    <div id="notes-container" class="dashboard-content"></div>
</div>

<script src="app.js"></script>
</body>
</html>
